<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>落語組用 落語AI大百科</title>
    <style>
        :root {
            --main-purple: #7F67B2;
            --light-purple: #F3EFFF;
            --dark-purple: #4A3E65;
            --bg-gray: #FAFAFA;
            --text-color: #333333;
            --border-color: #E2DDEB;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text-color);
            background-color: var(--bg-gray);
            display: flex;
            height: 100vh;
        }

        /* PC用のサイドバー設定 */
        .sidebar {
            width: 240px;
            background-color: var(--dark-purple);
            color: #ffffff;
            display: flex;
            flex-direction: column;
            padding: 20px 0;
            flex-shrink: 0;
        }
        .sidebar-brand {
            padding: 0 20px 20px 20px;
            font-size: 1.2rem;
            font-weight: bold;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .sidebar-menu { list-style: none; margin-top: 20px; }
        .sidebar-menu li a {
            display: block;
            padding: 10px 20px;
            color: #DDD5ED;
            text-decoration: none;
        }
        .sidebar-menu li.active a { background-color: var(--main-purple); color: #ffffff; }

        /* メインコンテナ */
        .main-container { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
        .header {
            background-color: #ffffff;
            padding: 15px 30px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
        }
        
        .content { max-width: 800px; width: 100%; margin: 0 auto; padding: 40px 20px; }
        .article-card { background-color: #ffffff; padding: 30px; border-radius: 6px; border: 1px solid var(--border-color); margin-bottom: 20px; }
        .article-category { color: var(--main-purple); font-size: 0.9rem; margin-bottom: 10px; font-weight: bold; }
        
        /* AIチャット部分 */
        #chat-box {
            background: #F8F6FC;
            border: 1px solid #E2DDEB;
            padding: 15px;
            border-radius: 6px;
            min-height: 200px;
            max-height: 450px;
            overflow-y: auto;
            margin-bottom: 15px;
            font-size: 0.95rem;
            line-height: 1.6;
        }
        .chat-input-area { display: flex; gap: 10px; }
        .chat-input-area input { flex: 1; padding: 12px; border: 1px solid var(--border-color); border-radius: 4px; font-size: 1rem; }
        .chat-input-area button { background-color: var(--main-purple); color: white; border: none; padding: 0 20px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .chat-input-area button:disabled { background-color: #ccc; cursor: not-allowed; }
        
        /* 例題タグ */
        .example-tags { margin-top: 15px; display: flex; flex-wrap: wrap; gap: 8px; }
        .tag { background: var(--light-purple); color: var(--dark-purple); padding: 6px 12px; border-radius: 12px; font-size: 0.85rem; cursor: pointer; border: 1px solid #E2DDEB; font-weight: 500; }
        .tag:hover { background: #E1D7F5; }

        /* スマホ用の見た目の自動切り替え（レスポンシブ） */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { display: none; }
            .header { padding: 15px; font-size: 0.9rem; justify-content: center; text-align: center; }
            .content { padding: 15px 10px; }
            .article-card { padding: 15px; border-radius: 0; border-left: none; border-right: none; }
            .chat-input-area { flex-direction: column; }
            .chat-input-area button { padding: 12px; }
            #chat-box { min-height: 250px; }
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="sidebar-brand">落語組用 🏯</div>
        <ul class="sidebar-menu">
            <li class="active"><a href="#">🤖 AIなんでも相談室</a></li>
        </ul>
    </nav>

    <div class="main-container">
        <header class="header">
            <div style="font-weight: bold; color: var(--dark-purple);">落語組専用Webページ</div>
        </header>

        <main class="content">
            <div class="article-card">
                <div class="article-category">🌟 落語研究会・AI顧問</div>
                <h2 style="margin-bottom: 10px; font-size: 1.2rem;">落語なんでも相談室</h2>
                <p style="font-size: 0.85rem; color: #666; margin-bottom: 15px;">演目のランクやあらすじ、演じ方のコツ、落語の歴史まで、何でもお気軽にご質問ください。</p>
                
                <div id="chat-box">
                    <p style="color: #666;">💬 下のボタンを押すか、直接知りたいことを入力して「質問する」を押してください。</p>
                </div>

                <div class="chat-input-area">
                    <input type="text" id="ai-input" placeholder="例：たらちねの登場人物と演じ方のコツを教えて！" onkeypress="if(event.key==='Enter') askAI()">
                    <button id="ai-btn" onclick="askAI()">質問する</button>
                </div>

                <!-- 💡 押したらそのまま送信される、シンプルな文章に変更しました -->
                <div class="example-tags">
                    <span class="tag" onclick="submitTag('演目のランク（前座噺・中ネタ・大ネタ）を調べたいです。')">🔍 前座噺か調べる</span>
                    <span class="tag" onclick="submitTag('登場人物の演じ分け（表情、声色、仕草）のコツを知りたいです。')">🗣️ キャラ演じ分けのコツ</span>
                    <span class="tag" onclick="clickTag('〇〇のサゲ（オチ）の種類と、その意味について解説してください。')">🎬 オチ（サゲ）の種類</span>
                    <span class="tag" onclick="submitTag('開口一番（トップバッター）や初心者におすすめの滑稽噺をいくつか教えてください。')">💡 おすすめのネタ相談</span>
                </div>
            </div>
        </main>
    </div>

    <script>
        // チャットの会話履歴を記憶する配列（ラリーを成立させるため）
        let chatHistory = [];

        // 💡 入力欄にセットするだけの古い関数（オチの種類など、直接書きたいとき用で一応残しています）
        function clickTag(text) {
            document.getElementById('ai-input').value = text;
            document.getElementById('ai-input').focus();
        }

        // 💡 押したらその場で即自動送信する新しい関数
        function submitTag(text) {
            document.getElementById('ai-input').value = text;
            askAI();
        }

        function getApiKey() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('key');
        }

        async function askAI() {
            const inputField = document.getElementById('ai-input');
            const button = document.getElementById('ai-btn');
            const chatBox = document.getElementById('chat-box');
            const query = inputField.value.trim();
            
            const apiKey = getApiKey();

            if (!query) return;
            
            if (!apiKey) {
                chatBox.innerHTML = `
                    <p style="color: red; font-weight: bold;">⚠️ URLにAPIキーがついていません</p>
                    <p style="font-size: 0.9rem; color: #555; margin-top: 5px;">
                        【部員への配布方法】<br>
                        VercelのURLの末尾に <code>?key=あなたのAPIキー</code> を付けた状態でURLをコピーして、みんなに配ってください！<br><br>
                        例：<code>https://xxxx.vercel.app/?key=AI_zaSy...</code>
                    </p>
                `;
                return;
            }

            inputField.disabled = true;
            button.disabled = true;
            
            // 初めての送信なら初期化、2回目以降なら既存の表示を維持しつつスクロール
            if (chatHistory.length === 0) {
                chatBox.innerHTML = `<p><strong>あなた:</strong> ${query}</p><p style="color: var(--main-purple); margin-top: 10px;"><strong>AI顧問 🤖:</strong> 調べています。少しお待ちください…</p>`;
            } else {
                // 既存の「調べています…」を消して、新しい「あなた」の発言を追加
                const loadingText = chatBox.querySelector('.loading-text');
                if (loadingText) loadingText.remove();
                chatBox.innerHTML += `<p style="margin-top: 10px;"><strong>あなた:</strong> ${query}</p><p class="loading-text" style="color: var(--main-purple); margin-top: 10px;"><strong>AI顧問 🤖:</strong> 調べています。少しお待ちください…</p>`;
            }
            chatBox.scrollTop = chatBox.scrollHeight;

            const systemInstruction = 
                "あなたは落語の歴史、演目、しぐさ、演出、寄席の文化など、落語に関するすべての知識に精通した、落語研究会の「AI顧問」です。\n" +
                "部員から落語に関する質問をされたら、プロの視点から具体的かつ分かりやすく回答してください。\n" +
                "【回答の心得】\n" +
                "1. 部員の質問に対して、具体的な「演目名」や「キャラクター名・役柄」が書かれていない場合は、絶対に憶測で回答せず、まず「良い質問ですね！具体的にどの演目（またはどの登場人物）について調べたいですか？」と、それだけを丁寧に聞き返してください。\n" +
                "2. 具体的な演目名が指定された場合は、前座噺・中ネタ・大ネタのどれにあたるかも必ず分かりやすく補足してください。\n" +
                "3. 演じ方のコツ（目線、声色、扇子・手ぬぐいの使い方など）を最低1つは盛り込んでください。\n" +
                "4. 口調は丁寧で親しみやすい「標準的な敬語（〜です、〜ます）」に統一してください。\n" +
                "5. 相手の名前（〇〇君など）は絶対に呼ばないでください。";

            // 履歴に今回の発言を追加
            chatHistory.push({ role: "user", parts: [{ text: query }] });

            try {
                // 会話履歴を含めて送信
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [
                            { role: "user", parts: [{ text: systemInstruction }] }, // システム指示を先頭に
                            ...chatHistory
                        ]
                    })
                });

                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error.message);
                }
                
                let aiResponse = data.candidates[0].content.parts[0].text;
                
                // 履歴にAIの返答を追加
                chatHistory.push({ role: "model", parts: [{ text: aiResponse }] });

                // HTML用に改行と太字を変換
                aiResponse = aiResponse.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

                // 読み込み中表示を消してAIの返答をドッキング
                const loadingText = chatBox.querySelector('.loading-text');
                if (loadingText) loadingText.remove();
                
                if (chatHistory.length <= 2) {
                    // 初回
                    chatBox.innerHTML = `
                        <p><strong>あなた:</strong> ${chatHistory[0].parts[0].text}</p>
                        <p style="margin-top: 10px; border-top: 1px dashed #E2DDEB; padding-top: 10px;">
                            <strong>AI顧問 🤖:</strong><br>${aiResponse}
                    </p>
                    `;
                } else {
                    // ラリー継続時
                    chatBox.innerHTML += `
                        <p style="margin-top: 10px; border-top: 1px dashed #E2DDEB; padding-top: 10px;">
                            <strong>AI顧問 🤖:</strong><br>${aiResponse}
                        </p>
                    `;
                }
                chatBox.scrollTop = chatBox.scrollHeight;

            } catch (error) {
                console.error(error);
                chatBox.innerHTML += `
                    <p style="color: red; margin-top: 10px;"><strong>エラーが発生しました。</strong><br>${error.message}</p>
                `;
            } finally {
                inputField.value = "";
                inputField.disabled = false;
                button.disabled = false;
                inputField.focus();
            }
        }
    </script>
</body>
</html>
